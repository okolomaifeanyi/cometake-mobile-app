name: cometake
description: Cometake — Multi-vendor ecommerce platform
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.4.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # Backend
  supabase_flutter: ^2.8.4
  dio: ^5.8.0+1

  # State & Navigation
  flutter_riverpod: ^2.6.1
  go_router: ^14.8.1

  # Code Generation
  freezed_annotation: ^2.4.4
  json_annotation: ^4.9.0

  # UI
  cached_network_image: ^3.4.1
  google_fonts: ^6.2.1
  shimmer: ^3.0.0
  image_picker: ^1.1.2

  # Storage & Connectivity
  flutter_secure_storage: ^9.2.4
  connectivity_plus: ^6.1.4

  # Browser / Payments
  url_launcher: ^6.3.1

  # Utilities
  logger: ^2.5.0
  package_info_plus: ^8.1.3
  intl: ^0.20.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  build_runner: ^2.4.13
  freezed: ^2.5.7
  json_serializable: ^6.9.3
  mocktail: ^1.0.4

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/icons/
